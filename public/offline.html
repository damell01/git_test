<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline – Trash Panda Roll-Offs</title>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    :root { --orange: #f97316; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0e0e0e;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .75rem; color: var(--orange); }
    p  { font-size: 1rem; color: #aaa; max-width: 30ch; margin: 0 auto 1.5rem; }
    a  {
      display: inline-block;
      padding: .6rem 1.4rem;
      background: var(--orange);
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: .9rem;
    }
    a:hover { background: #ea6a0a; }
  </style>
</head>
<body>
  <div class="icon">🦝</div>
  <h1>You're Offline</h1>
  <p>Check your connection and try again.</p>
  <a href="/">Try Again</a>
</body>
</html>
